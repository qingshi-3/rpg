<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L10,4 z" fill="#4ab36d"/>
    </marker>
    <marker id="arrow-red" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L10,4 z" fill="#dd584d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L10,4 z" fill="#5aa9dc"/>
    </marker>
    <style>
      text { font-family: "Noto Sans SC", "Microsoft YaHei", "DengXian", Arial, sans-serif; }
      .bg { fill: #15191e; }
      .panel { fill: #20262d; stroke: #46515d; stroke-width: 2; }
      .title { fill: #fff; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #d7dee6; font-size: 17px; }
      .section { fill: #ffffff; font-size: 22px; font-weight: 700; }
      .label { fill: #eef3f7; font-size: 18px; font-weight: 700; }
      .small { fill: #cbd5dd; font-size: 14px; }
      .tiny { fill: #b8c3cc; font-size: 12px; }
      .route-player { fill: none; stroke: #4ab36d; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); opacity: 0.86; }
      .route-enemy { fill: none; stroke: #dd584d; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-red); opacity: 0.86; stroke-dasharray: 16 12; }
      .route-extract { fill: none; stroke: #5aa9dc; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); opacity: 0.9; stroke-dasharray: 12 10; }
      .route-locked { fill: none; stroke: #d6b15e; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; stroke-dasharray: 8 8; }
      .node { stroke-width: 3; rx: 14; }
      .deploy { fill: #265f3a; stroke: #85d090; }
      .safe { fill: #314b3a; stroke: #7bbf86; }
      .hot { fill: #624b2b; stroke: #d8a64b; }
      .mechanic { fill: #49346f; stroke: #be91ff; }
      .enemy { fill: #6a2f38; stroke: #e06661; }
      .search { fill: #31465f; stroke: #84b7e8; }
      .extract { fill: #254f65; stroke: #77c7ef; }
      .obstacle { fill: #44484d; stroke: #aeb6bd; }
      .water { fill: #173d51; stroke: #2c84a6; }
      .badge { fill: #101419; stroke: #dfe7ef; stroke-width: 2; }
      .badgeText { fill: #fff; font-size: 17px; font-weight: 700; }
      .mode { fill: #27303a; stroke: #4a5663; stroke-width: 2; rx: 10; }
      .phase1 { fill: #3d5d3b; stroke: #83c57a; }
      .phase2 { fill: #654f30; stroke: #d5a756; }
      .phase3 { fill: #66323b; stroke: #de665f; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="920"/>
  <text class="title" x="42" y="48">战斗 Demo：矿洞亡灵督军 / 清晰拓扑版</text>
  <text class="subtitle" x="42" y="78">先画“区域、路线、阻隔、目标和撤离点”，再落 TileMap。地图有纵深，但每阶段只激活少数热区。</text>

  <rect class="panel" x="40" y="105" width="940" height="720" rx="10"/>
  <text class="section" x="66" y="142">地图拓扑总览</text>
  <text class="small" x="66" y="168">绿色是玩家路线，红色是敌方计划线，蓝色是撤离线。水路和障碍负责让入口产生真实差异。</text>

  <!-- Map abstract ground -->
  <g transform="translate(72 195)">
    <rect x="0" y="0" width="880" height="560" rx="18" fill="#222a2f" stroke="#38424c" stroke-width="2"/>

    <!-- Water barriers -->
    <path class="water" d="M30,255 C150,205 255,218 355,270 C465,326 552,314 650,248 C725,198 793,202 845,226 L845,305 C770,282 708,285 647,326 C548,395 426,386 326,332 C226,276 132,284 30,337 Z" opacity="0.88"/>
    <text class="small" x="44" y="246">水渠阻隔：普通单位不可走</text>
    <text class="tiny" x="610" y="300">水路让侧翼与右侧矿柱不能直接互通</text>

    <!-- Routes behind nodes -->
    <path class="route-player" d="M438,500 L438,410 L438,328"/>
    <path class="route-player" d="M118,385 L190,306 L245,242"/>
    <path class="route-player" d="M245,95 L295,172 L360,292"/>
    <path class="route-player" d="M438,328 L592,278 L715,205"/>
    <path class="route-locked" d="M438,328 L560,330 L650,302"/>
    <path class="route-extract" d="M438,410 C535,468 646,492 786,492"/>

    <path class="route-enemy" d="M792,420 L684,358 L548,335"/>
    <path class="route-enemy" d="M726,205 L650,302"/>
    <path class="route-enemy" d="M726,205 L560,322 L438,328"/>

    <!-- Region halos -->
    <rect class="phase1" x="348" y="280" width="190" height="132" rx="16" opacity="0.28"/>
    <rect class="phase2" x="192" y="190" width="150" height="132" rx="16" opacity="0.25"/>
    <rect class="phase2" x="598" y="244" width="150" height="132" rx="16" opacity="0.25"/>
    <rect class="phase3" x="635" y="96" width="188" height="150" rx="16" opacity="0.25"/>

    <!-- Nodes -->
    <rect class="node deploy" x="350" y="470" width="176" height="74"/>
    <circle class="badge" cx="371" cy="491" r="18"/><text class="badgeText" x="360" y="497">D1</text>
    <text class="label" x="402" y="494">主入口</text>
    <text class="small" x="382" y="520">4 格容量，稳定推进</text>

    <rect class="node deploy" x="28" y="346" width="180" height="74"/>
    <circle class="badge" cx="49" cy="367" r="18"/><text class="badgeText" x="38" y="373">D2</text>
    <text class="label" x="80" y="370">侧翼矿道</text>
    <text class="small" x="60" y="396">1-2 人，近矿柱但孤立</text>

    <rect class="node deploy" x="162" y="44" width="184" height="76"/>
    <circle class="badge" cx="184" cy="66" r="18"/><text class="badgeText" x="173" y="72">D3</text>
    <text class="label" x="214" y="70">高地入口</text>
    <text class="small" x="198" y="96">视野/射线优势，下撤慢</text>

    <rect class="node safe" x="354" y="382" width="168" height="66"/>
    <circle class="badge" cx="376" cy="404" r="18"/><text class="badgeText" x="365" y="410">F1</text>
    <text class="label" x="405" y="407">前线营地</text>
    <text class="small" x="390" y="432">撤离/补给/换线节点</text>

    <rect class="node hot" x="348" y="284" width="180" height="82"/>
    <circle class="badge" cx="370" cy="307" r="18"/><text class="badgeText" x="359" y="313">C1</text>
    <text class="label" x="400" y="310">中央瓶颈</text>
    <text class="small" x="382" y="336">R1-R4 热区，决定主路节奏</text>

    <rect class="node mechanic" x="176" y="180" width="160" height="92"/>
    <circle class="badge" cx="198" cy="204" r="18"/><text class="badgeText" x="187" y="210">M1</text>
    <text class="label" x="226" y="207">魂火矿柱 A</text>
    <text class="small" x="204" y="234">侧翼 2-4 格接触</text>
    <text class="tiny" x="204" y="254">搜打撤：可作为高价值搜索点</text>

    <rect class="node mechanic" x="602" y="250" width="166" height="92"/>
    <circle class="badge" cx="624" cy="274" r="18"/><text class="badgeText" x="613" y="280">M2</text>
    <text class="label" x="652" y="277">魂火矿柱 B</text>
    <text class="small" x="630" y="304">主路/断桥后接触</text>
    <text class="tiny" x="630" y="324">净化或破坏改变 Boss 爆发</text>

    <rect class="node search" x="376" y="92" width="180" height="72"/>
    <circle class="badge" cx="398" cy="114" r="18"/><text class="badgeText" x="387" y="120">S1</text>
    <text class="label" x="428" y="118">遗物 / 情报箱</text>
    <text class="small" x="414" y="142">搜索目标，可能触发伏兵</text>

    <rect class="node enemy" x="640" y="96" width="200" height="108"/>
    <circle class="badge" cx="664" cy="122" r="18"/><text class="badgeText" x="653" y="128">B</text>
    <text class="label" x="696" y="125">Boss 核心区</text>
    <text class="small" x="680" y="151">亡灵督军 / 引魂祭司</text>
    <text class="tiny" x="680" y="174">R7-R10 决战，或搜打撤高风险区</text>

    <rect class="node enemy" x="740" y="390" width="116" height="76"/>
    <circle class="badge" cx="762" cy="412" r="18"/><text class="badgeText" x="751" y="418">R</text>
    <text class="label" x="790" y="416">增援口</text>
    <text class="small" x="778" y="442">R5 激活</text>

    <rect class="node extract" x="710" y="478" width="142" height="74"/>
    <circle class="badge" cx="733" cy="501" r="18"/><text class="badgeText" x="722" y="507">X</text>
    <text class="label" x="764" y="504">撤离点</text>
    <text class="small" x="746" y="530">带资源/伤员撤出</text>

    <rect class="node obstacle" x="518" y="296" width="92" height="54"/>
    <text class="label" x="536" y="319">断桥</text>
    <text class="tiny" x="528" y="340">工兵可修</text>

    <rect class="node obstacle" x="214" y="344" width="98" height="54"/>
    <text class="label" x="235" y="367">石堆</text>
    <text class="tiny" x="224" y="388">破坏后开退路</text>

    <!-- Phase labels -->
    <text class="tiny" x="360" y="278">R1-R4 当前热区</text>
    <text class="tiny" x="184" y="174">R2-R6 侧翼目标</text>
    <text class="tiny" x="612" y="244">R4-R8 转线目标</text>
    <text class="tiny" x="648" y="88">R7-R10 核心区</text>
  </g>

  <!-- Right side legend -->
  <rect class="panel" x="1010" y="105" width="350" height="720" rx="10"/>
  <text class="section" x="1036" y="142">图例</text>
  <text class="small" x="1036" y="168">本图只讲地图拓扑，不讲完整回合。</text>
  <g transform="translate(1036 200)">
    <rect class="deploy" x="0" y="0" width="34" height="22" rx="4"/><text class="small" x="48" y="17">部署入口</text>
    <rect class="safe" x="0" y="44" width="34" height="22" rx="4"/><text class="small" x="48" y="61">前线营地 / 换线点</text>
    <rect class="hot" x="0" y="88" width="34" height="22" rx="4"/><text class="small" x="48" y="105">当前交战瓶颈</text>
    <rect class="mechanic" x="0" y="132" width="34" height="22" rx="4"/><text class="small" x="48" y="149">机制物件</text>
    <rect class="search" x="0" y="176" width="34" height="22" rx="4"/><text class="small" x="48" y="193">搜索 / 情报目标</text>
    <rect class="enemy" x="0" y="220" width="34" height="22" rx="4"/><text class="small" x="48" y="237">Boss / 增援</text>
    <rect class="extract" x="0" y="264" width="34" height="22" rx="4"/><text class="small" x="48" y="281">撤离点</text>
    <rect class="water" x="0" y="308" width="34" height="22" rx="4"/><text class="small" x="48" y="325">水路阻隔</text>
    <rect class="obstacle" x="0" y="352" width="34" height="22" rx="4"/><text class="small" x="48" y="369">障碍 / 可破坏物</text>

    <line x1="0" y1="424" x2="74" y2="424" style="stroke:#4ab36d;stroke-width:8;stroke-linecap:round"/>
    <text class="small" x="0" y="456">玩家可规划路线</text>
    <line x1="0" y1="492" x2="74" y2="492" style="stroke:#dd584d;stroke-width:8;stroke-linecap:round;stroke-dasharray:12 8"/>
    <text class="small" x="0" y="524">敌方计划线</text>
    <line x1="0" y1="560" x2="74" y2="560" style="stroke:#5aa9dc;stroke-width:8;stroke-linecap:round;stroke-dasharray:12 8"/>
    <text class="small" x="0" y="592">撤离线</text>
  </g>

  <!-- Timeline -->
  <rect class="panel" x="40" y="845" width="1320" height="52" rx="10"/>
  <text class="small" x="64" y="877">节奏：</text>
  <rect class="phase1" x="122" y="858" width="214" height="24" rx="6"/><text class="tiny" x="140" y="875">R1-R3：部署承诺 / 接触前锋</text>
  <rect class="phase2" x="360" y="858" width="258" height="24" rx="6"/><text class="tiny" x="378" y="875">R4-R6：转线 / 搜索 / 阻断增援</text>
  <rect class="phase3" x="642" y="858" width="260" height="24" rx="6"/><text class="tiny" x="660" y="875">R7-R10：Boss 核心 / 撤离压力</text>
  <rect class="extract" x="926" y="858" width="222" height="24" rx="6"/><text class="tiny" x="944" y="875">R10-R12：贪收益或撤出</text>
  <text class="tiny" x="1170" y="875">R2 接触，R3 出后果。</text>
</svg>
