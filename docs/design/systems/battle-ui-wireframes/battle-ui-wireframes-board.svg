<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2050" viewBox="0 0 1600 2050">
  <title>战斗 UI 低保真交互图</title>
  <style>
    .board-bg { fill: #f8f8f8; }
    .title { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
    .subtitle { font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #444; }
    .screen-title { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
    .label { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111; }
    .small { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #222; }
    .tiny { font: 12px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #333; }
    .muted { fill: #666; }
    .panel { fill: #fff; stroke: #151515; stroke-width: 2; }
    .region { fill: #f3f3f3; stroke: #222; stroke-width: 1.5; }
    .region-light { fill: #fafafa; stroke: #222; stroke-width: 1.5; }
    .button { fill: #fff; stroke: #222; stroke-width: 1.5; rx: 5; }
    .button-active { fill: #e8e8e8; stroke: #111; stroke-width: 2.4; rx: 5; }
    .button-disabled { fill: #eeeeee; stroke: #999; stroke-width: 1.2; rx: 5; }
    .map-mark { fill: none; stroke: #111; stroke-width: 2; }
    .range { fill: #e9e9e9; stroke: #555; stroke-width: 1.2; }
    .preview { fill: none; stroke: #111; stroke-width: 2; stroke-dasharray: 8 5; }
    .invalid { fill: none; stroke: #444; stroke-width: 2; stroke-dasharray: 3 3; }
  </style>

  <defs>
    <symbol id="hud-frame" viewBox="0 0 720 420">
      <rect class="panel" x="0" y="0" width="720" height="420" rx="4"/>
      <rect class="region" x="0" y="0" width="720" height="44"/>
      <rect class="region-light" x="0" y="44" width="500" height="258"/>
      <rect class="region-light" x="500" y="44" width="220" height="258"/>
      <rect class="region" x="0" y="302" width="720" height="38"/>
      <rect class="region" x="0" y="340" width="720" height="80"/>
      <text class="tiny muted" x="12" y="28">TopTurnBar</text>
      <text class="tiny muted" x="12" y="66">BattleMapViewport</text>
      <text class="tiny muted" x="512" y="66">InspectorPanel</text>
      <text class="tiny muted" x="12" y="326">PromptBar</text>
      <text class="tiny muted" x="12" y="363">ActionBar</text>
    </symbol>
  </defs>

  <rect class="board-bg" x="0" y="0" width="1600" height="2050"/>
  <text class="title" x="60" y="58">战斗 UI 低保真交互图</text>
  <text class="subtitle" x="60" y="88">只表达区域分布和功能变化，不定义最终样式。后续可用正式素材替换框线表现。</text>

  <g transform="translate(60 130)">
    <text class="screen-title" x="0" y="-18">01 观察地图</text>
    <use href="#hud-frame"/>
    <text class="label" x="112" y="28">第 1 回合</text>
    <text class="label" x="230" y="28">我方行动</text>
    <text class="small" x="445" y="28">回合顺序: [我] [敌] [我] [敌]</text>
    <text class="label" x="190" y="165">地图区域</text>
    <path class="map-mark" d="M246 190 L246 174 L262 174 M318 174 L334 174 L334 190 M334 246 L334 262 L318 262 M262 262 L246 262 L246 246"/>
    <text class="tiny" x="258" y="222">Hover 地块</text>
    <rect class="button" x="530" y="94" width="160" height="118"/>
    <text class="label" x="548" y="120">查看信息</text>
    <text class="small" x="548" y="148">坐标: 12, 8</text>
    <text class="small" x="548" y="174">高度: 1</text>
    <text class="small" x="548" y="200">通行: 可以</text>
    <text class="label" x="118" y="326">请选择一个单位</text>
    <text class="small" x="118" y="366">当前单位: 未选择</text>
    <rect class="button-disabled" x="118" y="378" width="92" height="28"/>
    <rect class="button-disabled" x="220" y="378" width="92" height="28"/>
    <rect class="button-disabled" x="322" y="378" width="92" height="28"/>
    <rect class="button-disabled" x="424" y="378" width="92" height="28"/>
    <rect class="button-disabled" x="526" y="378" width="104" height="28"/>
    <text class="tiny muted" x="144" y="397">移动</text>
    <text class="tiny muted" x="246" y="397">攻击</text>
    <text class="tiny muted" x="348" y="397">技能</text>
    <text class="tiny muted" x="450" y="397">待机</text>
    <text class="tiny muted" x="552" y="397">结束行动</text>
  </g>

