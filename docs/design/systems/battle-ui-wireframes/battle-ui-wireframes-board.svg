  <g transform="translate(820 1570)">
    <text class="screen-title" x="0" y="-18">图例和评审点</text>
    <rect class="panel" x="0" y="0" width="720" height="420" rx="4"/>
    <text class="label" x="32" y="48">线框图只评审:</text>
    <text class="small" x="52" y="82">1. 每个状态下信息放在哪个区域。</text>
    <text class="small" x="52" y="112">2. 玩家每次点击或 hover 后，哪些区域发生变化。</text>
    <text class="small" x="52" y="142">3. 行动按钮、地图范围、右侧详情、提示文字是否同步。</text>
    <text class="small" x="52" y="172">4. 取消、非法点击、敌方回合是否有清晰反馈。</text>
    <line x1="32" y1="206" x2="688" y2="206" stroke="#222" stroke-width="1.5"/>
    <rect class="button" x="52" y="238" width="92" height="28"/>
    <text class="small" x="166" y="258">普通按钮</text>
    <rect class="button-active" x="52" y="282" width="92" height="28"/>
