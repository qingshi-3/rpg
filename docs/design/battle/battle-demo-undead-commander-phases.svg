<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      text { font-family: "Noto Sans SC", "Microsoft YaHei", "DengXian", Arial, sans-serif; }
      .bg { fill: #15191e; }
      .panel { fill: #20262d; stroke: #46515d; stroke-width: 2; }
      .title { fill: #fff; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #d7dee6; font-size: 17px; }
      .section { fill: #fff; font-size: 22px; font-weight: 700; }
      .label { fill: #eef3f7; font-size: 17px; font-weight: 700; }
      .small { fill: #cbd5dd; font-size: 14px; }
      .tiny { fill: #b8c3cc; font-size: 12px; }
      .map { fill: #232b31; stroke: #3d4853; stroke-width: 2; }
      .node { stroke-width: 3; rx: 12; }
      .cold { fill: #2b333a; stroke: #606c77; }
      .phase1 { fill: #2f673f; stroke: #8ad08e; }
      .phase2 { fill: #6b512d; stroke: #d9aa56; }
      .phase3 { fill: #6e303b; stroke: #e36a61; }
      .phase4 { fill: #255369; stroke: #78c7ef; }
      .water { fill: #173d51; stroke: #2c84a6; }
      .path { fill: none; stroke: #4d5964; stroke-width: 6; stroke-linecap: round; }
      .hotline { fill: none; stroke: #f2d16f; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 10 8; }
      .card { fill: #27303a; stroke: #4a5663; stroke-width: 2; rx: 12; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="42" y="48">回合热区推进：不要全图同时开战</text>
  <text class="subtitle" x="42" y="78">战略纵深来自“未来热区”和路线投资，而不是让玩家每回合处理整张地图。</text>

  <rect class="panel" x="40" y="105" width="1320" height="650" rx="10"/>
  <g transform="translate(70 145)">
    <!-- shared mini map -->
    <rect class="map" x="0" y="0" width="820" height="520" rx="16"/>
    <path class="water" d="M35,250 C150,205 250,218 345,270 C460,330 548,314 640,250 C706,205 762,204 800,225 L800,300 C740,278 690,286 640,325 C542,386 432,380 330,330 C225,280 132,286 35,336 Z" opacity="0.62"/>

    <path class="path" d="M408,478 L408,382 L408,310"/>
    <path class="path" d="M110,375 L190,294 L236,222"/>
    <path class="path" d="M242,82 L296,168 L408,310"/>
    <path class="path" d="M408,310 L596,292 L706,170"/>
    <path class="path" d="M408,382 C505,454 630,480 752,480"/>

    <!-- cold nodes -->
    <rect class="node cold" x="330" y="452" width="160" height="56"/><text class="label" x="365" y="486">主入口</text>
    <rect class="node cold" x="32" y="344" width="156" height="56"/><text class="label" x="68" y="379">侧翼入口</text>
    <rect class="node cold" x="164" y="42" width="170" height="58"/><text class="label" x="214" y="77">高地</text>
    <rect class="node cold" x="334" y="350" width="150" height="58"/><text class="label" x="372" y="385">前线营地</text>
    <rect class="node cold" x="330" y="270" width="158" height="68"/><text class="label" x="367" y="309">中央瓶颈</text>
    <rect class="node cold" x="168" y="176" width="154" height="70"/><text class="label" x="202" y="216">矿柱 A</text>
    <rect class="node cold" x="580" y="250" width="150" height="70"/><text class="label" x="615" y="290">矿柱 B</text>
    <rect class="node cold" x="356" y="92" width="170" height="58"/><text class="label" x="398" y="128">搜索点</text>
    <rect class="node cold" x="625" y="90" width="180" height="94"/><text class="label" x="672" y="130">Boss 核心</text>
    <rect class="node cold" x="708" y="380" width="100" height="62"/><text class="label" x="728" y="417">增援</text>
    <rect class="node cold" x="690" y="464" width="126" height="54"/><text class="label" x="722" y="497">撤离</text>

    <!-- phase overlays -->
    <rect class="node phase1" x="330" y="270" width="158" height="68" opacity="0.72"/>
    <rect class="node phase1" x="330" y="452" width="160" height="56" opacity="0.72"/>
    <path class="hotline" d="M408,452 L408,338"/>
    <text class="small" x="500" y="308">R1-R3：部署承诺，主路接触</text>

    <rect class="node phase2" x="168" y="176" width="154" height="70" opacity="0.76"/>
    <rect class="node phase2" x="580" y="250" width="150" height="70" opacity="0.76"/>
    <path class="hotline" d="M245,246 L408,310 L655,320"/>
    <text class="small" x="55" y="166">R4-R6：矿柱、断桥、转线</text>

    <rect class="node phase3" x="625" y="90" width="180" height="94" opacity="0.78"/>
    <rect class="node phase3" x="708" y="380" width="100" height="62" opacity="0.72"/>
    <path class="hotline" d="M655,250 L706,184"/>
    <text class="small" x="610" y="62">R7-R10：Boss 核心与增援压力</text>

    <rect class="node phase4" x="690" y="464" width="126" height="54" opacity="0.8"/>
    <path class="hotline" d="M410,408 C520,462 640,486 690,490"/>
    <text class="small" x="516" y="512">R10-R12：继续贪收益，或撤离保成果</text>
  </g>

  <!-- explanation cards -->
  <g transform="translate(930 145)">
    <text class="section" x="0" y="0">阶段设计</text>
    <rect class="card" x="0" y="28" width="360" height="104"/>
    <rect class="phase1" x="18" y="50" width="34" height="22" rx="5"/>
    <text class="label" x="66" y="68">R1-R3：接触</text>
    <text class="small" x="18" y="96">玩家确认入口承诺，敌方意图公开。</text>
    <text class="small" x="18" y="118">第 3 回合必须有第一次后果窗口。</text>

    <rect class="card" x="0" y="152" width="360" height="104"/>
    <rect class="phase2" x="18" y="174" width="34" height="22" rx="5"/>
    <text class="label" x="66" y="192">R4-R6：转线</text>
    <text class="small" x="18" y="220">矿柱、桥、石堆和搜索点让玩家</text>
    <text class="small" x="18" y="242">决定继续推进、侧翼补救或撤回。</text>

    <rect class="card" x="0" y="276" width="360" height="104"/>
    <rect class="phase3" x="18" y="298" width="34" height="22" rx="5"/>
    <text class="label" x="66" y="316">R7-R10：核心冲突</text>
    <text class="small" x="18" y="344">Boss 核心区激活，前面路线选择</text>
    <text class="small" x="18" y="366">决定此时是优势决战还是被迫救火。</text>

    <rect class="card" x="0" y="400" width="360" height="104"/>
    <rect class="phase4" x="18" y="422" width="34" height="22" rx="5"/>
    <text class="label" x="66" y="440">R10-R12：撤离 / 贪收益</text>
    <text class="small" x="18" y="468">给搜打撤、救援、资源保全留空间。</text>
    <text class="small" x="18" y="490">不强制每场都杀 Boss。</text>
  </g>
</svg>
